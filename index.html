<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Smart Catalog & Receptionist</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        .kamar-pudar {
            filter: grayscale(100%);
            opacity: 0.4;
            background-color: #e9ecef !important;
        }
        .bg-telaga {
            background-color: #005f73 !important;
        }
        .text-telaga {
            color: #005f73 !important;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container py-4">
        <h1 class="text-center mb-4 text-telaga fw-bold">🏨 Katalog Kamar Mandiri - Hotel Telaga Biru</h1>
        
        <div class="row text-center mb-4">
            <div class="col">
                <button class="btn btn-primary w-100 bg-telaga border-0" onclick="gantiTab('tamu')">📱 Tampilan HP Tamu (Katalog Kamar)</button>
            </div>
            <div class="col">
                <button class="btn btn-dark w-100" onclick="gantiTab('resepsionis')">💼 Dasbor Resepsionis</button>
            </div>
        </div>

        <!-- TAB TAMU -->
        <div id="tab-tamu" class="mb-4">
            <h3 class="mb-3 text-secondary">Silahkan Pilih Kamar Anda:</h3>
            <div class="row" id="area-katalog-tamu"></div>
        </div>

        <!-- TAB RESEPSIONIS -->
        <div id="tab-resepsionis" class="d-none">
            <!-- LOGIN SECTION -->
            <div id="area-login" class="card p-4 shadow-sm mx-auto mb-4" style="max-width: 400px;">
                <h4 class="text-center mb-3 text-telaga">Masuk Resepsionis</h4>
                <input type="text" id="user" class="form-control mb-2" placeholder="Username">
                <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
                <button class="btn btn-primary w-100 bg-telaga border-0" onclick="prosesLogin()">Masuk</button>
            </div>

            <!-- KONTROL UTAMA -->
            <div id="area-internal" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="text-telaga fw-bold">⚙️ Dasbor Internal Kamar</h4>
                    <button class="btn btn-sm btn-danger" onclick="prosesLogout()">Keluar/Logout</button>
                </div>
                
                <div class="card p-3 shadow-sm mb-4">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>No. Kamar</th>
                                <th>Kelas & Fasilitas</th>
                                <th>Harga / Malam</th>
                                <th>Status Saklar</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-kontrol-kamar"></tbody>
                    </table>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="card p-3 shadow-sm">
                            <h4>📝 Buku Daftar Tamu</h4>
                            <div class="mb-3">
                                <input type="text" id="input-nama-tamu" class="form-control form-control-sm mb-2" placeholder="Nama Tamu">
                                <input type="text" id="input-kamar-tamu" class="form-control form-control-sm mb-2" placeholder="No. Kamar">
                                <button class="btn btn-sm btn-success" onclick="tambahBukuTamu()">Check-in Tamu</button>
                            </div>
                            <ul id="daftar-buku-tamu" class="list-group list-group-flush"></ul>
                        </div>
                    </div>

                    <div class="col-md-6 mb-4">
                        <div class="card p-3 shadow-sm bg-dark text-white">
                            <h4>💰 Cash Flow Keuangan</h4>
                            <h2 class="text-warning" id="total-saldo">Rp 0</h2>
                            <hr class="bg-white">
                            <div class="mb-2">
                                <input type="text" id="ket-keuangan" class="form-control form-control-sm mb-2" placeholder="Keterangan Transaksi">
                                <input type="number" id="nominal-keuangan" class="form-control form-control-sm mb-2" placeholder="Nominal Rp">
                                <button class="btn btn-sm btn-warning" onclick="tambahTransaksi()">Catat Transaksi</button>
                            </div>
                            <ul id="riwayat-keuangan" class="list-group list-group-flush text-dark" style="max-height: 150px; overflow-y: auto;"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let daftarKamar = [];
        const kelasKamar = [
            { kode: "E", nama: "Ekonomi", harga: 143000, fas: "Fan, Kamar Mandi Luar" },
            { kode: "S", nama: "Standar", harga: 165000, fas: "Fan, Kamar Mandi Dalam" },
            { kode: "V", nama: "VIP", harga: 233000, fas: "Fan, TV, AC" },
            { kode: "B", nama: "Lantai Bawah", harga: 265000, fas: "Akses Mudah Lantai Bawah" }
        ];

        kelasKamar.forEach(k => {
            for(let i=1; i<=5; i++) {
                daftarKamar.push({ no: k.kode + "0" + i, tipe: k.nama, harga: k.harga, fasilitas: k.fas, terisi: false });
            }
        });

        let bukuTamu = [];
        let cashFlow = [];

        if (localStorage.getItem("tb_kamar")) daftarKamar = JSON.parse(localStorage.getItem("tb_kamar"));
        if (localStorage.getItem("tb_tamu")) bukuTamu = JSON.parse(localStorage.getItem("tb_tamu"));
        if (localStorage.getItem("tb_cash")) cashFlow = JSON.parse(localStorage.getItem("tb_cash"));

        function renderKatalogTamu() {
            let area = document.getElementById("area-katalog-tamu");
            area.innerHTML = "";
            daftarKamar.forEach(kamar => {
                let pudar = kamar.terisi ? "kamar-pudar" : "";
                let tombol = kamar.terisi ? "disabled" : "";
                let teks = kamar.terisi ? "Sudah Terisi" : "Tersedia";
                
                area.innerHTML += `
                    <div class="col-md-4 col-sm-6 mb-3">
                        <div class="card shadow-sm ${pudar}">
                            <div class="card-body">
                                <h5 class="card-title fw-bold text-telaga">Kamar ${kamar.no}</h5>
                                <h6 class="card-subtitle mb-2 text-muted">Kelas: ${kamar.tipe}</h6>
                                <p class="card-text small mb-1">💡 ${kamar.fasilitas}</p>
                                <p class="card-text text-success fw-bold">Rp ${kamar.harga.toLocaleString('id-ID')} / malam</p>
                                <span class="badge ${kamar.terisi ? 'bg-danger' : 'bg-success'} mb-3">${teks}</span>
                                <br>
                                <button class="btn btn-sm btn-outline-primary w-100" ${tombol} onclick="alert('Silahkan lakukan pembayaran CASH langsung ke meja Resepsionis untuk mengunci Kamar ${kamar.no}')">Pilih Kamar</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderDasborResepsionis() {
            let tabel = document.getElementById("tabel-kontrol-kamar");
            tabel.innerHTML = "";
            daftarKamar.forEach((kamar, index) => {
                tabel.innerHTML += `
                    <tr>
                        <td><b>Kamar ${kamar.no}</b></td>
                        <td><span class="badge bg-secondary">${kamar.tipe}</span> <small class="text-muted">${kamar.fasilitas}</small></td>
                        <td>Rp ${kamar.harga.toLocaleString('id-ID')}</td>
                        <td>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" ${kamar.terisi ? 'checked' : ''} onchange="ubahStatusKamar(${index})">
                                <label class="form-check-label">${kamar.terisi ? 'Terisi' : 'Kosong'}</label>
                            </div>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("daftar-buku-tamu").innerHTML = bukuTamu.map(t => `<li class="list-group-item small">👤 ${t.nama} (Kamar ${t.kamar})</li>`).join("");
            document.getElementById("riwayat-keuangan").innerHTML = cashFlow.map(c => `<li class="list-group-item small d-flex justify-content-between"><span>${c.ket}</span><b class="text-success">+ Rp ${c.nominal.toLocaleString('id-ID')}</b></li>`).join("");
            let total = cashFlow.reduce((sum, item) => sum + Number(item.nominal), 0);
            document.getElementById("total-saldo").innerText = "Rp " + total.toLocaleString('id-ID');
        }

        function ubahStatusKamar(index) {
            daftarKamar[index].terisi = !daftarKamar[index].terisi;
            localStorage.setItem("tb_kamar", JSON.stringify(daftarKamar));
            renderKatalogTamu();
            renderDasborResepsionis();
        }

        function prosesLogin() {
            let u = document.getElementById("user").value;
            let p = document.getElementById("pass").value;
            if (u === "resepsionis" && p === "resepsionisadmin123") {
                document.getElementById("area-login").classList.add("d-none");
                document.getElementById("area-internal").classList.remove("d-none");
                renderDasborResepsionis();
            } else {
                alert("Akun salah! Sinyal ditolak.");
            }
        }
